name: Test Coverage Debug

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  test-coverage:
    runs-on: windows-latest
    steps:

      # ------------------------------------------------------
      # 1) Checkout Code
      # ------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # 2) Setup MSBuild (For .NET Framework)
      # ------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      # ------------------------------------------------------
      # 3) Setup .NET SDK (For NuGet Restore)
      # ------------------------------------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x  # Adjust to match your project

      # ------------------------------------------------------
      # 4) Restore NuGet Packages
      # ------------------------------------------------------
      - name: Restore NuGet Packages
        shell: powershell
        run: nuget restore .\RenCloud\RenCloud.sln

      # ------------------------------------------------------
      # 5) Install Missing Dependencies
      # ------------------------------------------------------
      - name: Install Vlc.DotNet Dependencies
        shell: powershell
        run: |
          dotnet add .\RenCloud\RenCloud.csproj package Vlc.DotNet.Core --version 3.1.0
          dotnet add .\RenCloud\RenCloud.csproj package Vlc.DotNet.Forms --version 3.1.0

      # ------------------------------------------------------
      # 6) Build the Solution Using MSBuild
      # ------------------------------------------------------
      - name: Build Solution with MSBuild (NET Framework)
        shell: powershell
        run: msbuild .\RenCloud\RenCloud.sln /p:Configuration=Debug /p:Platform="Any CPU"

      # ------------------------------------------------------
      # 7) Build the Test Project
      # ------------------------------------------------------
      - name: Build Test Project
        shell: powershell
        run: msbuild .\TestRenCloud\TestRenCloud.csproj /p:Configuration=Debug /p:Platform="Any CPU"

      # ------------------------------------------------------
      # 8) Run Tests & Generate Coverage
      # ------------------------------------------------------
      - name: Run Tests with Coverage
        shell: powershell
        run: |
          $testResultsDir = ".\TestRenCloud\TestResults"
          if (-Not (Test-Path $testResultsDir)) {
            New-Item -Path $testResultsDir -ItemType Directory -Force
          }
          
          dotnet test .\TestRenCloud\TestRenCloud.csproj `
            --configuration Debug `
            --no-build `
            --collect:"XPlat Code Coverage" `
            --logger:trx `
            --results-directory $testResultsDir

      # ------------------------------------------------------
      # 9) Check for coverage.opencover.xml
      # ------------------------------------------------------
      - name: Check for coverage.opencover.xml
        shell: powershell
        run: |
          $coverageFile = Get-ChildItem -Path .\TestRenCloud\TestResults\ -Recurse -Filter "coverage.opencover.xml" | Select-Object -First 1
          if ($coverageFile) {
            Write-Host "✅ Found coverage.opencover.xml at $($coverageFile.FullName)"
            Get-Content $coverageFile.FullName | Select-Object -First 20
          } else {
            Write-Error "🚨 coverage.opencover.xml NOT FOUND!"
            exit 1
          }
