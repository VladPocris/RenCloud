name: Build & Sonar

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    runs-on: windows-latest
    steps:

      # ------------------------------------------------------
      # 1) Checkout
      # ------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------
      # 2) Setup MSBuild (for old .NET Framework w/ COM references)
      # ------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      # ------------------------------------------------------
      # 3) Setup Java 17 for Sonar
      # ------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # ------------------------------------------------------
      # 4) Cache Sonar scanner
      # ------------------------------------------------------
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      # ------------------------------------------------------
      # 5) Install SonarQube scanner if not in cache
      # ------------------------------------------------------
      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .sonar\scanner -ItemType Directory -Force
          dotnet tool install dotnet-sonarscanner --tool-path .sonar\scanner

      # ------------------------------------------------------
      # 6) Restore main solution (NuGet)
      # ------------------------------------------------------
      - name: Restore main solution
        shell: powershell
        run: |
          nuget restore .\RenCloud\RenCloud.sln
          dotnet add .\TestRenCloud\TestRenCloud.csproj package coverlet.collector

      # ------------------------------------------------------
      # 7) Build main solution w/ msbuild
      # ------------------------------------------------------
      - name: Build main solution
        shell: powershell
        run: msbuild .\RenCloud\RenCloud.sln /p:Configuration=Debug

      # ------------------------------------------------------
      # 8) Build SDK-style MSTest project w/ msbuild
      # ------------------------------------------------------
      - name: Build MSTest SDK-style
        shell: powershell
        run: msbuild .\TestRenCloud\TestRenCloud.csproj /p:Configuration=Debug

      # ------------------------------------------------------
      # 9) Sonar Begin (Updated coverage report path)
      # ------------------------------------------------------
      - name: Sonar Begin
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner.exe begin `
            /k:"rencloud_rencloud" `
            /o:"rencloud" `
            /d:sonar.token="368a03945fcda4a9a8721c26102995580ff54c33" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.inclusions="**/*.cs" `
            /d:sonar.scanner.skipJreProvisioning=true `
            /d:sonar.cs.opencover.reportsPaths="TestRenCloud/TestResults/**/coverage.opencover.xml"

      # ------------------------------------------------------
      # 10) Re-Build for Sonar
      # ------------------------------------------------------
      - name: Re-Build for Sonar
        shell: powershell
        run: msbuild .\RenCloud\RenCloud.sln /p:Configuration=Debug

      # ------------------------------------------------------
      # 11) Run MSTest with Coverlet (Ensure correct coverage collection)
      # ------------------------------------------------------
      - name: Run MSTest with coverlet
        shell: powershell
        run: |
          $testResultsDir = ".\TestRenCloud\TestResults"
          if (-Not (Test-Path $testResultsDir)) {
            New-Item -Path $testResultsDir -ItemType Directory -Force
          }

          dotnet test .\TestRenCloud\TestRenCloud.csproj `
            --configuration Debug `
            --no-build `
            --collect:"XPlat Code Coverage" `
            --logger:trx `
            --results-directory $testResultsDir `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput=$testResultsDir\coverage.opencover.xml

          if ($LASTEXITCODE -ne 0) {
            Write-Error "🚨 Tests failed! No coverage file will be generated."
            exit 1
          }


      # ------------------------------------------------------
      # 12) Debug TestResults Folder (Check Where Coverage is Generated)
      # ------------------------------------------------------
      - name: Debug TestResults Folder
        shell: powershell
        run: |
          Write-Host "Checking TestResults directory..."
          if (Test-Path ".\RenCloud\TestResults") {
            Get-ChildItem -Path .\RenCloud\TestResults\ -Recurse
          } else {
            Write-Error "🚨 TestResults directory NOT FOUND! No coverage report generated."
            exit 1
          }

      - name: List All Files in TestResults
        shell: powershell
        run: |
          Write-Host "🔍 Listing all files in TestResults directory..."
          if (Test-Path ".\RenCloud\TestResults") {
            Get-ChildItem -Path .\RenCloud\TestResults\ -Recurse -Force | Format-Table -AutoSize
          } else {
            Write-Error "🚨 TestResults directory NOT FOUND! No coverage report generated."
            exit 1
          }

      # ------------------------------------------------------
      # 13) Debug coverage.opencover.xml (Ensure File Exists)
      # ------------------------------------------------------
      - name: Debug TestResults Folder (List Everything)
        shell: powershell
        run: |
          Write-Host "Checking TestResults directory..."
          if (Test-Path ".\RenCloud\TestResults") {
            Write-Host "TestResults directory found! Listing contents:"
            Get-ChildItem -Path .\RenCloud\TestResults\ -Recurse -Force | Format-Table -AutoSize
          } else {
            Write-Error "TestResults directory NOT FOUND! No coverage report generated."
            exit 1
          }



      # ------------------------------------------------------
      # 14) Sonar End
      # ------------------------------------------------------
      - name: Sonar End
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner.exe end `
            /d:sonar.token="368a03945fcda4a9a8721c26102995580ff54c33"
